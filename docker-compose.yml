version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sleep-bci-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Production API server
  api:
    build: .
    container_name: sleep-bci-api
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # CLI service for running commands
  cli:
    build: .
    profiles:
      - cli
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    entrypoint: ["/docker-entrypoint.sh"]

  # ARQ background worker — processes preprocessing and training jobs
  worker:
    build: .
    container_name: sleep-bci-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["arq", "sleep_bci.workers.settings.WorkerSettings"]

  # Development service with hot reload
  dev:
    build: .
    profiles:
      - dev
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    command:
      - uvicorn
      - sleep_bci.api.app:app
      - --reload
      - --host
      - "0.0.0.0"
      - --port
      - "${PORT:-8000}"
